server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers. Not decoration: this app renders third-party article
    # text (deliberately, including a known prompt-injection payload), so
    # locking down what the page may execute or embed is load-bearing.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # SPA: unknown paths are client-side routes, not 404s.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin proxy to the API -- so the browser never needs CORS and the
    # frontend needs no hardcoded backend host.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;   # investigations can take minutes
    }

    location /health/ {
        proxy_pass http://backend:8000;
    }

    location ~* \.(js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
