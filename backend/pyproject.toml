[tool.ruff]
line-length = 110
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = [
  # Long lines: this codebase deliberately carries dense explanatory comments
  # and long, honest error messages (e.g. the Groq TPM hint). Wrapping them
  # would hurt readability more than the length does.
  "E501",
]

[tool.black]
line-length = 110
target-version = ["py311"]

[tool.isort]
profile = "black"
line_length = 110

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
# Deliberately NOT strict. This codebase is heavily typed where it matters
# (contracts, schemas, enums), but a full strict pass over SQLAlchemy 2.x
# declarative models and dynamic **fields repositories would generate hundreds
# of low-value errors and pressure real code into type-shaped contortions.
# We check what catches genuine bugs and say so, rather than suppressing
# per-line and calling it clean.
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_optional = true
exclude = "(tests/|migrations/)"

[tool.bandit]
exclude_dirs = ["tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
